<form id="submitForm" style="display:none; margin-top: 30px;">
  <h3>➕ Add New AI Tool</h3>
  <input type="text" id="toolName" placeholder="Tool Name" required />
  <textarea id="toolDesc" placeholder="Tool Description" required></textarea>

  <input type="url" id="toolLink" placeholder="Tool Website Link (e.g. https://chat.openai.com)" required />
  <input type="url" id="toolImage" placeholder="Tool Image URL (logo/png)" required />

  <select id="toolCategory" required>
    <option value="">Select Category</option>
    <option value="writing">Writing</option>
    <option value="image">Image</option>
    <option value="video">Video</option>
    <option value="chatbot">Chatbot</option>
    <option value="code">Code</option>
  </select>

  <select id="toolTag" required>
    <option value="">Select Tag</option>
    <option value="Free">Free</option>
    <option value="Paid">Paid</option>
  </select>

  <button type="submit">Submit Tool</button>
</form>
